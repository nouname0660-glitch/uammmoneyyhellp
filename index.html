<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
<title>ДіяПослуги — Виплати</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --panel-bg: rgba(0,0,0,0.65);
  --text: #fff;
  --muted: rgba(255,255,255,0.8);
  --btn-primary-bg: linear-gradient(135deg, #FFD700, #FFA500);
  --btn-primary-hover: linear-gradient(135deg, #FFE55C, #FFB347);
  --btn-secondary-bg: rgba(255,255,255,0.18);
  --btn-secondary-hover: rgba(255,255,255,0.3);
  --radius: 24px;
  --max-width: 440px;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body{
  height:100%; 
  margin:0; 
  font-family:"Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background: linear-gradient(270deg, #5b2cff, #2b4dff, #00d3c1, #00ff8a);
  background-size: 800% 800%;
  animation: gradientAnimation 20s ease infinite;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 16px;
  color: var(--text);
  min-height: 100vh;
}

@keyframes gradientAnimation {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.card{
  width:100%;
  max-width:var(--max-width);
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
  justify-content:center;
  padding: 32px 24px;
  border-radius:32px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  background: var(--panel-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  text-align:center;
  opacity:0;
  transform: translateY(20px);
  animation: fadeInCard 0.8s forwards;
  border: 1px solid rgba(255,255,255,0.15);
}

@keyframes fadeInCard {
  to { opacity:1; transform:translateY(0);}
}

.logo-wrapper {
  margin-bottom: 8px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.logo-badge {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 10px 20px;
  border-radius: 60px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  border: 1px solid rgba(255,255,255,0.2);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.95);
}

.logo-badge::before {
  content: "⚡";
  font-size: 18px;
}

h1{
  font-size: clamp(26px, 7vw, 34px);
  line-height:1.2;
  font-weight:800;
  margin:0 0 8px;
  opacity:0;
  transform:translateY(20px);
  animation: fadeInText 0.8s forwards 0.2s;
  letter-spacing: -0.02em;
}

.highlight{
  display:inline-block;
  padding: 4px 16px;
  border-radius:60px;
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color:#000;
  font-weight:800;
  font-size: clamp(26px, 7vw, 34px);
  position:relative;
  animation: glowPulse 2s ease-in-out infinite;
  box-shadow: 0 4px 20px rgba(255,215,0,0.4);
  margin: 0 2px;
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(255,215,0,0.4); }
  50% { box-shadow: 0 4px 30px rgba(255,215,0,0.9); }
}

p.lead{
  color:var(--muted);
  font-size: clamp(15px, 4vw, 16px);
  max-width: 320px;
  margin: 0 0 16px;
  opacity:0;
  transform:translateY(20px);
  animation: fadeInText 0.8s forwards 0.3s;
  line-height: 1.5;
  padding: 0 10px;
}

@keyframes fadeInText {
  to { opacity:1; transform:translateY(0);}
}

.button-group {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
  margin: 10px 0 5px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap: 12px;
  text-decoration:none;
  padding: 18px 24px;
  border-radius:100px;
  font-weight:700;
  font-size: 17px;
  letter-spacing:0.2px;
  cursor:pointer;
  transition: all 0.2s ease;
  opacity:0;
  transform:translateY(20px);
  border: none;
  width: 100%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.btn-primary{
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color:#000;
  font-weight: 800;
}
.btn-primary:active{
  transform: scale(0.98);
  background: linear-gradient(135deg, #FFC800, #FF8C00);
  box-shadow: 0 5px 15px rgba(255,215,0,0.5);
}

.btn-secondary{
  background: var(--btn-secondary-bg);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color:#fff;
  border: 1.5px solid rgba(255,255,255,0.25);
  font-weight: 600;
}
.btn-secondary:active{
  transform: scale(0.98);
  background: rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.4);
}

.btn-icon {
  font-size: 22px;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

@keyframes fadeInBtn {
  to { opacity:1; transform:translateY(0);}
}

.foot{
  margin-top: 15px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  text-align:center;
  opacity:0;
  animation: fadeInText 0.8s forwards 0.9s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 10px;
}

.foot span {
  display: inline-block;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  margin: 0 4px;
}

/* Спеціальні стилі для дуже маленьких екранів */
@media (max-width: 380px) {
  .card { padding: 24px 18px; }
  .btn { padding: 16px 18px; font-size: 16px; }
  .btn-icon { font-size: 20px; }
  .logo-badge { font-size: 13px; padding: 8px 16px; }
}

/* Стилі для безпеки на екранах з великим зумом */
@media (max-width: 280px) {
  body { padding: 8px; }
  .card { padding: 20px 12px; }
  .btn { padding: 14px 12px; font-size: 14px; }
}

/* Покращена доступність для тач-пристроїв */
@media (hover: none) {
  .btn:hover {
    transform: none;
  }
  .btn-primary:active {
    transform: scale(0.98);
  }
}
</style>
</head>
<body>
<main class="card" role="main" aria-labelledby="title">

  <div class="logo-wrapper">
    <div class="logo-badge">ДіяПослуги</div>
  </div>

  <h1 id="title">
    <span>Отримайте</span><br>
    <span class="highlight">виплату</span>
  </h1>

  <p class="lead" id="desc">
    Швидке зарахування коштів на вашу картку. Оберіть зручний спосіб отримання.
  </p>

  <div class="button-group">
    <a id="oschadBtn" class="btn btn-primary" target="_blank" rel="noopener noreferrer" href="#">
      <span class="btn-icon">🏦</span> На карту Ощад
    </a>

    <a id="otherCardBtn" class="btn btn-secondary" target="_blank" rel="noopener noreferrer" href="#">
      <span class="btn-icon">💳</span> На карту Приват 
    </a>
  </div>

  <div class="foot">
    <span>🔒</span> Безпечне зарахування <span></span> Усі картки України
  </div>

</main>

<script>
(function(){
  const config = {
    oschadLink: "https://vj-giving-wonder.up.railway.app/pr/gBWsWYW",
    otherCardLink: "https://vj-giving-wonder.up.railway.app/pr/4QgW74d",
  };

  const oschadBtn = document.getElementById("oschadBtn");
  const otherCardBtn = document.getElementById("otherCardBtn");

  if (config.oschadLink && config.oschadLink !== "#") {
    oschadBtn.href = config.oschadLink;
  } else {
    oschadBtn.style.display = "none";
  }
  
  if (config.otherCardLink && config.otherCardLink !== "#") {
    otherCardBtn.href = config.otherCardLink;
  } else {
    otherCardBtn.style.display = "none";
  }

  // Анімація кнопок з правильною затримкою
  const buttons = [oschadBtn, otherCardBtn];
  buttons.forEach((btn, i) => {
    if (btn.style.display !== "none") {
      btn.style.animation = `fadeInBtn 0.5s forwards ${(i * 0.15) + 0.4}s`;
    }
  });

  // Додаємо активний стан для тач-пристроїв
  if ('ontouchstart' in window) {
    document.body.style.cursor = 'pointer';
  }
})();
</script>
</body>
</html>
